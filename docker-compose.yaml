name: clientxcms
services:
  cli:
    image: clientxcms/cli:dev
    volumes:
      - /home/alex/DATA/ClientXCMS/ClientXCMS:/workspaces/laravel
      - /home/alex/DATA/ClientXCMS/ClientXCMS/.devcontainer/cli/.claude:/home/user/.claude
      - /home/alex/DATA/Modules:/workspaces/Modules
      - /home/alex/DATA/Addons:/workspaces/Addons
      - /home/alex/DATA/Themes:/workspaces/Themes
      - /home/alex/.local/share/mkcert/rootCA.pem:/usr/local/share/ca-certificates/mkcert-ca.crt:ro
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.laravel-scheduler.schedule: "@every 1m"
      ofelia.job-exec.laravel-scheduler.command: "php /workspaces/laravel/artisan schedule:run"
    networks:
      - shared-infra

  fpm:
    image: clientxcms/fpm:dev
    volumes:
      - /home/alex/DATA/ClientXCMS/ClientXCMS:/workspaces/laravel
      - /home/alex/DATA/Modules:/workspaces/Modules
      - /home/alex/DATA/Addons:/workspaces/Addons
      - /home/alex/DATA/Themes:/workspaces/Themes
      - /home/alex/.local/share/mkcert/rootCA.pem:/usr/local/share/ca-certificates/mkcert-ca.crt:ro
    user: 1000:1000
    networks:
      - shared-infra

  nginx:
    image: clientxcms/nginx:dev
    volumes:
      - /home/alex/DATA/ClientXCMS/ClientXCMS:/workspaces/laravel
      - /home/alex/DATA/Modules:/workspaces/Modules
      - /home/alex/DATA/Addons:/workspaces/Addons
      - /home/alex/DATA/Themes:/workspaces/Themes
    depends_on:
      - fpm
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.clientxcms.rule=Host(`clientxcms.dev.localhost`)"
      - "traefik.http.routers.clientxcms.entrypoints=https"
      - "traefik.http.routers.clientxcms.tls=true"
      - "traefik.http.services.clientxcms.loadbalancer.server.port=80"
    networks:
      - shared-infra

  queue:
    image: clientxcms/cli:dev
    volumes:
      - /home/alex/DATA/ClientXCMS/ClientXCMS:/workspaces/laravel
      - /home/alex/DATA/Modules:/workspaces/Modules
      - /home/alex/DATA/Addons:/workspaces/Addons
      - /home/alex/DATA/Themes:/workspaces/Themes
      - /home/alex/.local/share/mkcert/rootCA.pem:/usr/local/share/ca-certificates/mkcert-ca.crt:ro
    command: php /workspaces/laravel/artisan queue:work redis --queue=high,default,low --sleep=3 --tries=3 --max-time=3600
    restart: unless-stopped
    networks:
      - shared-infra

networks:
  shared-infra:
    external: true
